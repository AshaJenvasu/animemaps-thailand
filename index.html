<!doctype html>

<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <!--ถ้าไม่ใส่ ภาษาไทยในเว็บจะแสดงผลเป็นอักขระแปลกๆ -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animemaps Thailand</title>
    <link rel="stylesheet" href="styles/general.css" />
    <link rel="stylesheet" href="styles/nav.css" />
    <link rel="stylesheet" href="styles/slideshow.css" />
    <link rel="stylesheet" href="styles/event.css" />
    <link rel="stylesheet" href="styles/comingsoon.css" />
    <link rel="stylesheet" href="styles/footer.css" />

    <!--font-->
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <header>
      <nav>
        <div id="logo">Animemaps Thailand</div>
        <!--Navigation Bar--Mobile-->
        <div class="nav-mobile">
          <a href="index.html">
            <img src="icon/home.png" alt="home" />
          </a>

          <a href="event-calender.html">
            <img src="icon/event-calendar.png" alt="event-calendar" />
          </a>

          <a href="about-us.html">
            <img src="icon/about-us.png" alt="about-us" />
          </a>
          <div id="search-popup-mobile">
            <input type="search" placeholder="ค้นหาอีเว้น..." />
          </div>
        </div>
        <!--Navigation Bar-->
        <div class="nav-menu">
          <ul>
            <!--"Unordered List" (รายการแบบไม่เรียงลำดับ) -->
            <li>
              <a href="index.html">
                <span>Home</span>
                <span>หน้าหลัก</span>
              </a>
            </li>
            <!--(List Item) กำหนดรายการย่อยภายในรายการหลัก-->
            <li>
              <a href="event-calender.html">
                <span>Event Calender</span>
                <span>ตารางอีเว้น</span>
              </a>
            </li>
            <li>
              <a href="about-us.html">
                <span>About us</span>
                <span>เกี่ยวกับพวกเรา</span>
              </a>
            </li>
          </ul>
          <button id="search-btn">
            <div class="search-icon">Search</div>
            <div>ค้นหา</div>
          </button>
        </div>
      </nav>
    </header>

    <!--SEARCH POPUP-->
    <div id="search-popup">
      <input type="text" placeholder="ค้นหาอีเว้น..." />
      <button id="close-search">X</button>
    </div>

    <!--SLIDESHOW-->
    <section id="slideshow">
      <button id="back-btn">&#8249;</button>
      <div id="slideshow-container"></div>
      <button id="next-btn">&#8250;</button>
    </section>

    <!--EVENT RECOMMENDATION-->
    <section id="recommendations">
      <div class="container">
        <h1>รวบรวม Anime Events ทั่วไทย!</h1>
        <div id="recommendations-layout">
          <div id="event-container">
            <h2>Event Recommendation!</h2>
            <h3>อีเว้นมาแรงช่วงนี้!</h3>
          </div>
          <div id="upcoming-events">
            <h2>Coming Soon!</h2>
            <h3>กำลังมาเร็วๆนี้!</h3>
          </div>
        </div>
      </div>
    </section>

    <!--Footer-->
    <footer>
      <div class="footer-container">
        <div id="footer-logo">Animemaps Thailand</div>
        <div class="footer-links">
          <a href="about-us.html">About Us</a>
          <span>|</span>
          <a href="https://www.linkedin.com/in/chaiyawat-jenvasu-a5a606335"
            >Contact Us</a
          >
        </div>
        <p class="footer-copyright">
          © 2026 Animemaps Thailand. All rights reserved.
        </p>
      </div>
    </footer>
    <script src="scripts/slides.js"></script>
    <script src="scripts/events.js"></script>
    <script src="scripts/comingsoon.js"></script>
    <script src="scripts/search.js"></script>
  </body>
</html>
